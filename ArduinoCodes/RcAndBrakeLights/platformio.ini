; Arduino Nano (ATmega328, 5 V): MPU6050 + NeoPixel brake (HP) + R8EF RC motor mixing
; MPU6050: I2C SDA=A4, SCL=A5, VCC/GND per module (many boards accept 5 V VIN)
[platformio]
default_envs = nanoatmega328new

[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
lib_deps =
	adafruit/Adafruit NeoPixel
	adafruit/Adafruit MPU6050
